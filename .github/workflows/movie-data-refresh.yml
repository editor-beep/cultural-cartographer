name: Movie Data Refresh

on:
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Run systematic refresh
        run: npm run data:refresh

      - name: Upload generated data artifact
        uses: actions/upload-artifact@v4
        with:
          name: movie-data-generated
          path: |
            data/generated/*.json
          if-no-files-found: warn
